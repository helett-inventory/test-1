<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
  Helett Inventory Dashboard
</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0f1117;
  --bg2:#171923;
  --card:#1d2030;
  --card2:#262a40;
  --border:#2b3045;
  --text:#e5e7eb;
  --text2:#9ca3af;
  --mono:'IBM Plex Mono',monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
}

header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  position:sticky;
  top:0;
  z-index:50;
}

.title{
  font-size:15px;
  font-weight:800;
}

.sub{
  font-size:11px;
  color:var(--text2);
  margin-top:2px;
  font-family:var(--mono);
}

.live{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:var(--text2);
  font-family:var(--mono);
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
}

.main{
  padding:22px;
  max-width:1700px;
  margin:auto;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:22px;
}

.kpi{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
}

.kpi-label{
  font-size:11px;
  text-transform:uppercase;
  color:var(--text2);
  margin-bottom:8px;
}

.kpi-value{
  font-size:30px;
  font-weight:800;
}

.table-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.topbar{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.search{
  width:220px;
  height:36px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text);
  padding:0 12px;
  outline:none;
  font-family:var(--mono);
}

.table-wrap{
  overflow:auto;
  max-height:75vh;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  position:sticky;
  top:0;
  z-index:10;
}

thead tr{
  background:var(--bg2);
}

th{
  padding:14px 12px;
  text-align:left;
  font-size:11px;
  color:var(--text2);
  border-bottom:1px solid var(--border);
  text-transform:uppercase;
}

td{
  padding:13px 12px;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

tbody tr:hover{
  background:var(--card2);
}

.sku{
  font-family:var(--mono);
}

.num{
  text-align:right;
  font-family:var(--mono);
}

.loading{
  padding:80px;
  text-align:center;
  color:var(--text2);
  font-family:var(--mono);
}

.err{
  background:#3b0d0d;
  color:#fecaca;
  padding:18px;
  border-radius:12px;
  margin-top:20px;
  white-space:pre-wrap;
}

</style>

</head>

<body>

<header>

  <div>

    <div class="title">
      Helett Inventory Dashboard
    </div>

    <div
      class="sub"
      id="syncText"
    >
      Connecting...
    </div>

  </div>

  <div class="live">
    <div class="dot"></div>
    LIVE SYNC
  </div>

</header>

<div class="main">

  <div class="kpis">

    <div class="kpi">
      <div class="kpi-label">
        Total SKUs
      </div>

      <div
        class="kpi-value"
        id="kpiSku"
      >
        0
      </div>
    </div>

    <div class="kpi">
      <div class="kpi-label">
        Sellable
      </div>

      <div
        class="kpi-value"
        id="kpiSell"
      >
        0
      </div>
    </div>

    <div class="kpi">
      <div class="kpi-label">
        Unsellable
      </div>

      <div
        class="kpi-value"
        id="kpiUnsell"
      >
        0
      </div>
    </div>

    <div class="kpi">
      <div class="kpi-label">
        Semi Goods
      </div>

      <div
        class="kpi-value"
        id="kpiSemi"
      >
        0
      </div>
    </div>

  </div>

  <div
    class="table-card"
    id="tableCard"
  >

    <div class="loading">
      Loading Google Sheets...
    </div>

  </div>

</div>

<script>

const SHEET_URL =
'https://docs.google.com/spreadsheets/d/1jZv_Qqeg2RWXssYroxyS3_fCW_D09Nqhbf6Px9s6pR4/export?format=xlsx';

function toNum(v){

  if(v === '' || v === null || v === undefined)
    return 0;

  const n =
    parseFloat(
      String(v).replace(/,/g,'')
    );

  return isNaN(n) ? 0 : n;
}

function updateTime(){

  const now = new Date();

  document.getElementById('syncText').innerText =
    'Last Sync • ' +
    now.toLocaleDateString() +
    ' • ' +
    now.toLocaleTimeString();
}

function parseSheet(sheet, headerRow){

  const raw =
    XLSX.utils.sheet_to_json(
      sheet,
      {
        header:1,
        defval:''
      }
    );

  const headers =
    raw[headerRow];

  const data =
    raw.slice(headerRow + 1);

  return data.map(r=>{

    const obj = {};

    headers.forEach((h,i)=>{

      obj[String(h).trim()] = r[i];

    });

    return obj;

  }).filter(r=>
    Object.values(r).some(v=>v !== '')
  );
}

function getLatestDateColumn(headers){

  const cols = headers.filter(h=>
    /\d/.test(String(h))
  );

  return cols[cols.length - 1];
}

function findSkuCol(headers){

  return headers.find(h=>
    String(h)
    .toLowerCase()
    .includes('sku')
  );
}

function findAsinCol(headers){

  return headers.find(h=>
    String(h)
    .toLowerCase() === 'asin'
  );
}

function findQtyCol(headers){

  return headers.find(h=>{

    const s =
      String(h).toLowerCase();

    return (
      s.includes('qty') ||
      s.includes('stock') ||
      s.includes('quantity')
    );

  });
}

function buildRows(
  sellRows,
  unsellRows,
  semiRows
){

  const map = new Map();

  // SELLABLE

  if(sellRows.length){

    const headers =
      Object.keys(sellRows[0]);

    const skuCol =
      findSkuCol(headers);

    const asinCol =
      findAsinCol(headers);

    const qtyCol =
      findQtyCol(headers);

    sellRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      map.set(sku,{
        sku,
        asin:r[asinCol] || '',
        sellable:toNum(r[qtyCol]),
        unsellable:'-',
        semi:'-'
      });

    });
  }

  // UNSELLABLE

  if(unsellRows.length){

    const headers =
      Object.keys(unsellRows[0]);

    const skuCol =
      findSkuCol(headers);

    const latestCol =
      getLatestDateColumn(headers);

    unsellRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      const qty =
        toNum(r[latestCol]);

      if(map.has(sku)){

        map.get(sku).unsellable = qty;

      }else{

        map.set(sku,{
          sku,
          asin:'',
          sellable:'-',
          unsellable:qty,
          semi:'-'
        });

      }

    });
  }

  // SEMI GOODS

  if(semiRows.length){

    const headers =
      Object.keys(semiRows[0]);

    const skuCol =
      findSkuCol(headers);

    const latestCol =
      getLatestDateColumn(headers);

    semiRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      const qty =
        toNum(r[latestCol]);

      if(map.has(sku)){

        map.get(sku).semi = qty;

      }else{

        map.set(sku,{
          sku,
          asin:'',
          sellable:'-',
          unsellable:'-',
          semi:qty
        });

      }

    });
  }

  return Array.from(map.values());

}

function render(rows){

  document.getElementById('tableCard').innerHTML = `

    <div class="topbar">

      <div>
        ${rows.length} SKUs
      </div>

      <input
        class="search"
        id="search"
        placeholder="Search SKU..."
      />

    </div>

    <div class="table-wrap">

      <table>

        <thead>

          <tr>
            <th>SKU</th>
            <th>ASIN</th>
            <th>Sellable</th>
            <th>Unsellable</th>
            <th>Semi Goods</th>
          </tr>

        </thead>

        <tbody id="tbody">

          ${rows.map(r=>`

            <tr>

              <td class="sku">
                ${r.sku}
              </td>

              <td class="sku">
                ${r.asin || '-'}
              </td>

              <td class="num">
                ${r.sellable}
              </td>

              <td class="num">
                ${r.unsellable}
              </td>

              <td class="num">
                ${r.semi}
              </td>

            </tr>

          `).join('')}

        </tbody>

      </table>

    </div>
  `;

  document
    .getElementById('search')
    .addEventListener('input',e=>{

      const term =
        e.target.value.toLowerCase();

      document
        .querySelectorAll('#tbody tr')
        .forEach(tr=>{

          tr.style.display =
            tr.innerText
            .toLowerCase()
            .includes(term)
              ? ''
              : 'none';

        });
    });
}

async function loadSheets(){

  try{

    const res =
      await fetch(SHEET_URL);

    const buffer =
      await res.arrayBuffer();

    const workbook =
      XLSX.read(buffer,{type:'array'});

    const sellSheet =
      workbook.Sheets['Sellable_Inventory'];

    const unsellSheet =
      workbook.Sheets['Unsellable'];

    const semiSheet =
      workbook.Sheets['Semi Goods'];

    const sellRows =
      XLSX.utils.sheet_to_json(
        sellSheet,
        {defval:''}
      );

    const unsellRows =
      parseSheet(
        unsellSheet,
        2
      );

    const semiRows =
      parseSheet(
        semiSheet,
        1
      );

    const merged =
      buildRows(
        sellRows,
        unsellRows,
        semiRows
      );

    render(merged);

    document
      .getElementById('kpiSku')
      .innerText =
      merged.length.toLocaleString();

    document
      .getElementById('kpiSell')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.sellable === 'number'
            ? b.sellable
            : 0
        ),0
      ).toLocaleString();

    document
      .getElementById('kpiUnsell')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.unsellable === 'number'
            ? b.unsellable
            : 0
        ),0
      ).toLocaleString();

    document
      .getElementById('kpiSemi')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.semi === 'number'
            ? b.semi
            : 0
        ),0
      ).toLocaleString();

    updateTime();

  }catch(err){

    console.error(err);

    document.getElementById('tableCard').innerHTML = `

      <div class="err">

        ${err}

      </div>

    `;
  }
}

loadSheets();

setInterval(loadSheets,300000);

</script>

</body>
</html>
