<script>

// ==========================================
// CUSTOM SHEET PARSING
// ==========================================
// Sellable_Inventory -> normal header row
// Unsellable -> header starts at row 3
// Semi Goods -> header starts at row 2
// Latest date = RIGHT MOST DATE COLUMN
// ==========================================

function parseSheetWithHeaderRow(sheet, headerRowIndex){

  const raw =
    XLSX.utils.sheet_to_json(
      sheet,
      {
        header:1,
        defval:''
      }
    );

  const headers =
    raw[headerRowIndex];

  const rows =
    raw.slice(headerRowIndex + 1);

  return rows.map(r=>{

    const obj = {};

    headers.forEach((h,i)=>{
      obj[String(h).trim()] = r[i];
    });

    return obj;

  }).filter(r=>
    Object.values(r).some(v=>v !== '')
  );
}


// ==========================================
// GET RIGHT MOST DATE COLUMN
// ==========================================

function getLatestDateColumn(headers){

  const valid = headers.filter(h=>{

    const s = String(h).trim();

    return (
      /\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(s) ||
      /\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(s)
    );
  });

  return valid[valid.length - 1];
}


// ==========================================
// FIND SKU COL
// ==========================================

function findSkuCol(headers){

  return headers.find(h=>
    String(h).toLowerCase().includes('sku')
  );
}


// ==========================================
// FIND ASIN COL
// ==========================================

function findAsinCol(headers){

  return headers.find(h=>
    String(h).toLowerCase() === 'asin'
  );
}


// ==========================================
// FIND SELLABLE QTY COL
// ==========================================

function findQtyCol(headers){

  return headers.find(h=>
    String(h).toLowerCase().includes('qty') ||
    String(h).toLowerCase().includes('quantity') ||
    String(h).toLowerCase().includes('stock')
  );
}


// ==========================================
// BUILD MASTER MAP
// ==========================================

function buildMergedRows(
  sellRows,
  unsellRows,
  semiRows
){

  const map = new Map();

  // ======================================
  // SELLABLE
  // ======================================

  if(sellRows.length){

    const headers =
      Object.keys(sellRows[0]);

    const skuCol =
      findSkuCol(headers);

    const asinCol =
      findAsinCol(headers);

    const qtyCol =
      findQtyCol(headers);

    sellRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      map.set(sku,{
        sku,
        asin:
          String(r[asinCol] || '').trim(),
        sellable:
          toNum(r[qtyCol]),
        unsellable:'-',
        semi:'-'
      });

    });
  }

  // ======================================
  // UNSELLABLE
  // HEADER = ROW 3
  // LATEST = RIGHT MOST DATE
  // ======================================

  if(unsellRows.length){

    const headers =
      Object.keys(unsellRows[0]);

    const skuCol =
      findSkuCol(headers);

    const latestCol =
      getLatestDateColumn(headers);

    unsellRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      const qty =
        toNum(r[latestCol]);

      if(map.has(sku)){

        map.get(sku).unsellable = qty;

      }else{

        map.set(sku,{
          sku,
          asin:'',
          sellable:'-',
          unsellable:qty,
          semi:'-'
        });

      }

    });
  }

  // ======================================
  // SEMI GOODS
  // HEADER = ROW 2
  // LATEST = RIGHT MOST DATE
  // ======================================

  if(semiRows.length){

    const headers =
      Object.keys(semiRows[0]);

    const skuCol =
      findSkuCol(headers);

    const latestCol =
      getLatestDateColumn(headers);

    semiRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      const qty =
        toNum(r[latestCol]);

      if(map.has(sku)){

        map.get(sku).semi = qty;

      }else{

        map.set(sku,{
          sku,
          asin:'',
          sellable:'-',
          unsellable:'-',
          semi:qty
        });

      }

    });
  }

  return Array.from(map.values());

}


// ==========================================
// FINAL TABLE
// ==========================================

function renderMergedTable(rows){

  tablesContainer.innerHTML = `

    <div class="section">

      <div class="sec-hd">

        <div style="display:flex;align-items:center;gap:10px">

          <div class="sec-title">
            Inventory Dashboard
          </div>

          <div class="badge">
            ${rows.length} SKUs
          </div>

        </div>

        <div class="search">

          <input
            type="text"
            id="mainSearch"
            placeholder="Search SKU..."
          />

        </div>

      </div>

      <div class="table-wrap">

        <div class="table-scroll">

          <table>

            <thead>

              <tr>
                <th>SKU</th>
                <th>ASIN</th>
                <th>Sellable</th>
                <th>Unsellable</th>
                <th>Semi Goods</th>
              </tr>

            </thead>

            <tbody id="mainBody">

              ${rows.map(r=>`

                <tr>

                  <td class="sku">
                    ${r.sku}
                  </td>

                  <td class="sku">
                    ${r.asin || '-'}
                  </td>

                  <td class="num">
                    ${r.sellable}
                  </td>

                  <td class="num">
                    ${r.unsellable}
                  </td>

                  <td class="num">
                    ${r.semi}
                  </td>

                </tr>

              `).join('')}

            </tbody>

          </table>

        </div>

      </div>

    </div>
  `;

  document
    .getElementById('mainSearch')
    .addEventListener('input',e=>{

      const term =
        e.target.value.toLowerCase();

      document
        .querySelectorAll('#mainBody tr')
        .forEach(tr=>{

          tr.style.display =
            tr.innerText
              .toLowerCase()
              .includes(term)
              ? ''
              : 'none';
        });
    });
}


// ==========================================
// MAIN LOADER
// ==========================================

async function loadSheets(){

  try{

    tablesContainer.innerHTML =
      '<div class="loading">Fetching Google Sheets...</div>';

    const res =
      await fetch(SHEET_URL);

    const buffer =
      await res.arrayBuffer();

    const workbook =
      XLSX.read(buffer,{type:'array'});

    // ======================================
    // SHEETS
    // ======================================

    const sellSheet =
      workbook.Sheets['Sellable_Inventory'];

    const unsellSheet =
      workbook.Sheets['Unsellable'];

    const semiSheet =
      workbook.Sheets['Semi Goods'];

    // ======================================
    // PARSE
    // ======================================

    const sellRows =
      XLSX.utils.sheet_to_json(
        sellSheet,
        {defval:''}
      );

    const unsellRows =
      parseSheetWithHeaderRow(
        unsellSheet,
        2
      );

    const semiRows =
      parseSheetWithHeaderRow(
        semiSheet,
        1
      );

    // ======================================
    // MERGE
    // ======================================

    const merged =
      buildMergedRows(
        sellRows,
        unsellRows,
        semiRows
      );

    // ======================================
    // RENDER
    // ======================================

    renderMergedTable(merged);

    // ======================================
    // KPIs
    // ======================================

    document
      .getElementById('kpiSku')
      .innerText =
      merged.length.toLocaleString();

    document
      .getElementById('kpiSell')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.sellable === 'number'
            ? b.sellable
            : 0
        ),0
      ).toLocaleString();

    document
      .getElementById('kpiUnsell')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.unsellable === 'number'
            ? b.unsellable
            : 0
        ),0
      ).toLocaleString();

    document
      .getElementById('kpiSemi')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.semi === 'number'
            ? b.semi
            : 0
        ),0
      ).toLocaleString();

    updateTime();

  }catch(err){

    console.error(err);

    tablesContainer.innerHTML = `
      <div class="err">
${err}
      </div>
    `;
  }
}

</script>
