<script>

// ======================================
// READ ONLY LATEST DATE COLUMN
// FOR:
// - Unsellable
// - Semi Goods
// ======================================

function getLatestDateColumn(headers){

  const dateCols = headers.filter(h=>{

    const s = String(h).trim();

    return (
      /\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(s) ||
      /\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(s)
    );
  });

  return dateCols[dateCols.length - 1];
}


// ======================================
// BUILD MASTER SKU MAP
// ======================================

function buildMergedRows(
  sellRows,
  unsellRows,
  semiRows
){

  const map = new Map();

  // -----------------------------
  // SELLABLE
  // -----------------------------
  sellRows.forEach(r=>{

    const headers = Object.keys(r);

    const skuCol =
      headers.find(h=>
        h.toLowerCase().includes('sku')
      );

    const asinCol =
      headers.find(h=>
        h.toLowerCase() === 'asin'
      );

    const qtyCol =
      headers.find(h=>
        h.toLowerCase().includes('qty') ||
        h.toLowerCase().includes('stock') ||
        h.toLowerCase().includes('quantity')
      );

    const sku =
      String(r[skuCol] || '').trim();

    if(!sku) return;

    const asin =
      String(r[asinCol] || '').trim();

    const qty =
      toNum(r[qtyCol]);

    map.set(sku,{
      sku,
      asin,
      sellable: qty,
      unsellable: '-',
      semi: '-'
    });

  });

  // -----------------------------
  // UNSELLABLE
  // ONLY LATEST DATE
  // -----------------------------
  if(unsellRows.length){

    const headers =
      Object.keys(unsellRows[0]);

    const skuCol =
      headers.find(h=>
        h.toLowerCase().includes('sku')
      );

    const latestCol =
      getLatestDateColumn(headers);

    unsellRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      const qty =
        toNum(r[latestCol]);

      if(map.has(sku)){

        map.get(sku).unsellable = qty;

      }else{

        map.set(sku,{
          sku,
          asin:'',
          sellable:'-',
          unsellable:qty,
          semi:'-'
        });
      }

    });
  }

  // -----------------------------
  // SEMI GOODS
  // ONLY LATEST DATE
  // -----------------------------
  if(semiRows.length){

    const headers =
      Object.keys(semiRows[0]);

    const skuCol =
      headers.find(h=>
        h.toLowerCase().includes('sku')
      );

    const latestCol =
      getLatestDateColumn(headers);

    semiRows.forEach(r=>{

      const sku =
        String(r[skuCol] || '').trim();

      if(!sku) return;

      const qty =
        toNum(r[latestCol]);

      if(map.has(sku)){

        map.get(sku).semi = qty;

      }else{

        map.set(sku,{
          sku,
          asin:'',
          sellable:'-',
          unsellable:'-',
          semi:qty
        });
      }

    });
  }

  return Array.from(map.values());

}


// ======================================
// CREATE FINAL TABLE
// ======================================

function renderMergedTable(rows){

  tablesContainer.innerHTML = `

    <div class="section">

      <div class="sec-hd">

        <div style="display:flex;align-items:center;gap:10px">

          <div class="sec-title">
            Inventory Dashboard
          </div>

          <div class="badge">
            ${rows.length} SKUs
          </div>

        </div>

        <div class="search">
          <input
            type="text"
            id="mainSearch"
            placeholder="Search SKU..."
          />
        </div>

      </div>

      <div class="table-wrap">

        <div class="table-scroll">

          <table>

            <thead>
              <tr>
                <th>SKU</th>
                <th>ASIN</th>
                <th>Sellable</th>
                <th>Unsellable</th>
                <th>Semi Goods</th>
              </tr>
            </thead>

            <tbody id="mainBody">

              ${rows.map(r=>`

                <tr>

                  <td class="sku">
                    ${r.sku}
                  </td>

                  <td class="sku">
                    ${r.asin || '-'}
                  </td>

                  <td class="num">
                    ${r.sellable}
                  </td>

                  <td class="num">
                    ${r.unsellable}
                  </td>

                  <td class="num">
                    ${r.semi}
                  </td>

                </tr>

              `).join('')}

            </tbody>

          </table>

        </div>

      </div>

    </div>
  `;

  document
    .getElementById('mainSearch')
    .addEventListener('input',e=>{

      const term =
        e.target.value.toLowerCase();

      document
        .querySelectorAll('#mainBody tr')
        .forEach(tr=>{

          tr.style.display =
            tr.innerText.toLowerCase().includes(term)
              ? ''
              : 'none';
        });
    });

}


// ======================================
// REPLACE loadSheets()
// ======================================

async function loadSheets(){

  try{

    tablesContainer.innerHTML =
      '<div class="loading">Fetching Google Sheets...</div>';

    const res =
      await fetch(SHEET_URL);

    const buffer =
      await res.arrayBuffer();

    const workbook =
      XLSX.read(buffer,{type:'array'});

    const sellSheet =
      workbook.Sheets['Sellable_Inventory'];

    const unsellSheet =
      workbook.Sheets['Unsellable'];

    const semiSheet =
      workbook.Sheets['Semi Goods'];

    const sellRows =
      XLSX.utils.sheet_to_json(
        sellSheet,
        {defval:''}
      );

    const unsellRows =
      XLSX.utils.sheet_to_json(
        unsellSheet,
        {defval:''}
      );

    const semiRows =
      XLSX.utils.sheet_to_json(
        semiSheet,
        {defval:''}
      );

    const merged =
      buildMergedRows(
        sellRows,
        unsellRows,
        semiRows
      );

    renderMergedTable(merged);

    document
      .getElementById('kpiSku')
      .innerText =
      merged.length.toLocaleString();

    document
      .getElementById('kpiSell')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.sellable === 'number'
            ? b.sellable
            : 0
        ),0
      ).toLocaleString();

    document
      .getElementById('kpiUnsell')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.unsellable === 'number'
            ? b.unsellable
            : 0
        ),0
      ).toLocaleString();

    document
      .getElementById('kpiSemi')
      .innerText =
      merged.reduce((a,b)=>
        a + (
          typeof b.semi === 'number'
            ? b.semi
            : 0
        ),0
      ).toLocaleString();

    updateTime();

  }catch(err){

    tablesContainer.innerHTML =
      '<div class="err">'+err+'</div>';

    console.error(err);
  }
}

</script>
